name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel and sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload Python packages
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and build tools
        run: python -m pip install -e ".[build,dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build standalone executable
        run: python -m PyInstaller --noconfirm --clean phone-sync.spec

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/phone-sync.exe
          if-no-files-found: error

  publish:
    name: Attach assets to release
    needs: [build-wheel, build-windows-exe]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f -print

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
